<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>desktop-pet item</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      body {
        display: flex;
        align-items: center;
        justify-content: center;
      }
    </style>
  </head>
  <body>
    <div id="item-root"></div>
    <script>
      // main.js の loadFile(...,{ query: { kind } }) で渡される種類(coin/bone/enemy)を読み取り、
      // 対応する要素を作って登場アニメーションを開始する。片付けはmain.js側が
      // executeJavaScriptで直接クラスを差し替えてから、このウィンドウごと閉じる。
      const kind = new URLSearchParams(location.search).get('kind') || 'coin';
      const root = document.getElementById('item-root');
      let el;

      if (kind === 'enemy') {
        el = document.createElement('div');
        el.className = 'enemy';
        const sprite = document.createElement('div');
        sprite.className = 'enemy-sprite';
        el.appendChild(sprite);
      } else {
        el = document.createElement('div');
        el.className = `loot ${kind}`;
      }

      root.appendChild(el);
      requestAnimationFrame(() => {
        el.classList.add(kind === 'enemy' ? 'enemy-enter' : 'loot-enter');
      });
    </script>
  </body>
</html>
