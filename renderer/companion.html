<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>desktop-pet companion</title>
    <link rel="stylesheet" href="style.css" />
    <style>
      html,
      body {
        width: 100%;
        height: 100%;
        background: transparent;
        overflow: hidden;
      }
      /* style.cssの#petsは主人ウィンドウ(64px+吹き出し分の高さ)向けの数値なので、
         このウィンドウ(COMPANION_SIZE角)にはそのままだと合わない。ここで上書きする。 */
      #pets {
        height: 100%;
      }
    </style>
  </head>
  <body>
    <div id="pets">
      <div class="pet companion">
        <div class="pixel-sprite"></div>
        <div class="eye left"></div>
        <div class="eye right"></div>
      </div>
    </div>
    <script>
      // 色/見た目は起動時にmain.jsからquery paramで渡され、変更があった時は
      // main.js がexecuteJavaScriptで直接dataset/classを書き換える。
      // 位置(setBounds)と向き(facing-left)もすべてmain.js側が管理しており、
      // このウィンドウ自身は見た目を表示するだけの受け身の存在にしている。
      const params = new URLSearchParams(location.search);
      document.body.dataset.color = params.get('color') || 'white';
      document.body.dataset.skin = params.get('skin') || 'square';
    </script>
  </body>
</html>
